<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cardápio - Black Burger</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/cardapio.css">
  <link rel="stylesheet" href="css/responsivo.css">
</head>

<body>

  <nav class="navbar-cardapio">

     <ul class="nav-menu">
    <li><a href="index.html">Início</a></li>
    <li><a href="#">Cardápio</a></li>
  </ul>

  <div class="carrinho">
            🛒 <span>0</span>

  </div>
  
    <h2>🍔 Black Burger</h2>
  <a href="index.html" class="voltar">
     ← Voltar ao Início
  </a>

  </nav>

  <div id="overlay" class="overlay">
    <div class="painel-carrinho">

        <div class="topo-carrinho">
            <h2>Seu Carrinho</h2>

            <button id="fecharCarrinho">
                ✖
            </button>

        </div>

        <div id="lista-carrinho">
        </div>

        <h3 id="total">
            Total: R$ 0,00
        </h3>

        <button id="finalizarPedido">
            Finalizar Pedido
        </button>

    </div>
</div>

<!-- MODAL PARA FORMULARIO DO PEDIDO-->

<div id="modalPedido" class="modal-pedido">
    <div class="conteudo-modal">
        <div class="topo-modal">

            <h2>Finalizar Pedido</h2>

            <button id="fecharModal">
                ✖
            </button>

        </div>

        <div class="formulario">

            <input
            type="text"
            id="nomeCliente"
            placeholder="Nome">

            <input
            type="text"
            id="telefoneCliente"
            placeholder="Telefone">

            <input
            type="text"
            id="enderecoCliente"
            placeholder="Endereço">

            <input
            type="text"
            id="numeroCliente"
            placeholder="Número">

            <input
            type="text"
            id="complementoCliente"
            placeholder="Complemento">

            <select id="pagamentoCliente">

                <option value="">
                    Forma de pagamento
                </option>

                <option>
                    Pix
                </option>

                <option>
                    Cartão
                </option>

                <option>
                    Dinheiro
                </option>

            </select>

            <textarea
            id="observacaoCliente"
            placeholder="Observações"></textarea>

            <button id="enviarPedido">
                Enviar Pedido
            </button>

        </div>
    </div>
</div>

  <header class="hero-cardapio">

  <h1>Cardapio Completo</h1>
  <p> Escolha seus produtos favoritos e monte seu pedido.</p>

  </header>

<section class="pesquisa">

  <input
  type="text"
  id="pesquisa"
  placeholder="🔍 Pesquisar produto..."
  >

</section>

<section class="filtros">

    <button class="filtro ativo" data-categoria="todos">
        Todos
    </button>

    <button class="filtro" data-categoria="hamburguer">
        Hambúrgueres
    </button>

    <button class="filtro" data-categoria="bebida">
        Bebidas
    </button>

    <button class="filtro" data-categoria="porcao">
        Porções
    </button>

    <button class="filtro" data-categoria="sobremesa">
        Sobremesas
    </button>

</section>

<main>

  <div id="produtos"> </div>
  
</main>

<div id="toast" class="toast">
  Produto adicionado ao carrinho!
</div>

<div id="modalCombo" class="modal-combo">
    <div class="modal-conteudo">
        <h2 id="tituloCombo"></h2>
        <p>Escolha como deseja seu pedido:</p>

        <button id="btnLanche" class="btn-opcao">
            🍔 Apenas Lanche
        <small id="precoLanche"></small>
    </button>

   <button id="btnCombo" class="btn-opcao destaque">
    🍟 Combo ⭐
    <small>
        Acompanha Batata Frita + Refrigerante
    </small>
    <small id="precoCombo"></small>
</button>

        <button id="fecharModal" class="btn-fechar">
            Cancelar
        </button>

    </div>

</div>

<script src="js/produtos.js"></script>
<script src="js/toast.js"></script>
<script src="js/carrinho.js"></script>
<script src="js/cardapio.js"></script>

</body>
</html>
